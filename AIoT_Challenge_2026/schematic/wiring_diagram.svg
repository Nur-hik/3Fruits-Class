<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="800" viewBox="0 0 1400 800">
<style>text{font-family:Arial,sans-serif;fill:#172033}.title{font-size:28px;font-weight:bold}.h{font-size:20px;font-weight:bold}.t{font-size:16px}.box{fill:#f6f9ff;stroke:#2563eb;stroke-width:3}.wire{stroke:#16a34a;stroke-width:4;fill:none;marker-end:url(#a)}.power{stroke:#dc2626;stroke-width:4;fill:none}.ground{stroke:#111827;stroke-width:4;fill:none}</style><defs><marker id="a" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto"><path d="M0,0 L10,3 L0,6Z" fill="#16a34a"/></marker></defs>
<rect width="1400" height="800" fill="white"/><text x="50" y="55" class="title">AIoT Smart Fruit Quality Control — Wiring NodeMCU ESP8266 + Relay 4 Channel</text>
<rect x="65" y="170" width="275" height="370" rx="18" class="box"/><text x="115" y="220" class="h">NodeMCU ESP8266</text><text x="90" y="275" class="t">VIN (5V) ───────── VCC</text><text x="90" y="315" class="t">GND ───────────── GND</text><text x="90" y="365" class="t">D1 / GPIO5 ────── IN1</text><text x="90" y="405" class="t">D2 / GPIO4 ────── IN2</text><text x="90" y="445" class="t">D5 / GPIO14 ───── IN3</text><text x="90" y="485" class="t">D6 / GPIO12 ───── IN4</text>
<rect x="535" y="140" width="320" height="430" rx="18" class="box"/><text x="590" y="190" class="h">Relay 4 Channel (5V)</text><text x="570" y="250" class="t">IN1  ◀──────── D1</text><text x="570" y="300" class="t">IN2  ◀──────── D2</text><text x="570" y="350" class="t">IN3  ◀──────── D5</text><text x="570" y="400" class="t">IN4  ◀──────── D6</text><text x="570" y="470" class="t">COM ─── NO (each channel)</text><text x="570" y="515" class="t">Active LOW module</text>
<path d="M340 365H535" class="wire"/><path d="M340 405H535" class="wire"/><path d="M340 445H535" class="wire"/><path d="M340 485H535" class="wire"/><path d="M340 275H535" class="power"/><path d="M340 315H535" class="ground"/>
<rect x="1020" y="140" width="300" height="430" rx="18" class="box"/><text x="1090" y="190" class="h">Low-voltage Loads</text><text x="1050" y="250" class="t">NO1 → 220Ω → LED Apple</text><text x="1050" y="310" class="t">NO2 → 220Ω → LED Lemon</text><text x="1050" y="370" class="t">NO3 → 220Ω → LED Orange</text><text x="1050" y="430" class="t">NO4 → 220Ω → LED Rotten</text><text x="1050" y="500" class="t">LED cathodes → GND</text><path d="M855 470H1020" class="power"/><path d="M340 315V650H1170" class="ground"/>
<text x="70" y="715" class="h">Safety:</text><text x="165" y="715" class="t">Use LED / 5–12V DC only. Never connect PLN 220V AC for this demonstration.</text><text x="70" y="755" class="t">USB cable provides serial link: Laptop (Python CNN) → NodeMCU @ 115200 baud.</text>
</svg>
